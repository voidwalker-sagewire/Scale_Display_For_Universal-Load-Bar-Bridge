<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Yoke - HerdMate AI</title>
    <style>
        :root { --bg: #1a1a1a; --card: #2d2d2d; --text: #f0f0f0; --accent: #4caf50; --warning: #ff9800; --alert: #f44336; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; text-align: center; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #444; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .brand { color: #888; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
        h1 { font-size: 4rem; margin: 10px 0; color: var(--accent); }
        .prediction { color: var(--warning); font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; }
        .stats { display: flex; justify-content: space-around; font-size: 0.9rem; color: #aaa; margin-top: 15px; border-top: 1px solid #444; padding-top: 15px; }
        button { background: var(--accent); color: white; border: none; padding: 18px; width: 100%; border-radius: 10px; font-weight: bold; font-size: 1.1rem; cursor: pointer; margin-top: 10px; }
        .btn-sim { background: #444; margin-top: 20px; font-size: 0.9rem; border: 1px dashed #666; }
        #log { text-align: left; background: #111; padding: 10px; border-radius: 5px; font-family: monospace; font-size: 0.8rem; color: #0f0; height: 100px; overflow-y: auto; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="brand">HerdMate AI • The Yoke v2.0</div>

    <div class="card">
        <h3>CURRENT INVENTORY</h3>
        <h1 id="inv-display">2450.0</h1>
        <p>LBS REMAINING</p>
        <div class="prediction" id="days-display">Calculating...</div>
        
        <div class="stats">
            <div>Daily Avg: <span id="avg-display">50.0</span> lbs</div>
            <div>Usage: <span id="usage-display">Low</span></div>
        </div>
    </div>

    <button onclick="addDelivery()">+ ADD BULK DELIVERY</button>
    
    <button class="btn-sim" onclick="simulateScaleDrop()">[SIMULATE 50LB BAG DROP]</button>

    <div style="margin-top: 30px; text-align: left;">
        <h4>Recent Activity</h4>
        <div id="log"></div>
    </div>

    <script>
        // --- APP STATE ---
        let inventory = 2450.0;
        let dailyUsage = [50, 48, 52, 45, 55, 49, 51]; // Mock 7-day data
        
        function updateUI() {
            // Update Inventory
            document.getElementById('inv-display').innerText = inventory.toFixed(1);
            
            // Calculate Rolling Average
            let sum = dailyUsage.reduce((a, b) => a + b, 0);
            let avg = sum / dailyUsage.length;
            document.getElementById('avg-display').innerText = avg.toFixed(1);
            
            // Predict Days Remaining
            let daysLeft = inventory / avg;
            document.getElementById('days-display').innerText = `EST. ${daysLeft.toFixed(1)} DAYS REMAINING`;
            
            // Alert Check
            if (daysLeft < 3) {
                document.getElementById('days-display').style.color = "#f44336";
            } else {
                document.getElementById('days-display').style.color = "#ff9800";
            }
        }

        function addLog(msg) {
            const entry = document.createElement('div');
            entry.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            const log = document.getElementById('log');
            log.prepend(entry);
        }

        function addDelivery() {
            let val = prompt("Enter Bulk LBS Delivered:");
            if (val && !isNaN(val)) {
                inventory += parseFloat(val);
                addLog(`+${val} lbs (Delivery)`);
                updateUI();
            }
        }

        function simulateScaleDrop() {
            let weight = 50.0; // Simulated bag weight
            inventory -= weight;
            
            // Add to usage stats (simplification for the demo)
            dailyUsage.shift();
            dailyUsage.push(weight);
            
            addLog(`-${weight} lbs (Scale Usage)`);
            updateUI();
            
            // Demo Audio
            const msg = new SpeechSynthesisUtterance("50 pounds removed from bin");
            window.speechSynthesis.speak(msg);
        }

        // Initialize
        updateUI();
    </script>
</body>
</html>
